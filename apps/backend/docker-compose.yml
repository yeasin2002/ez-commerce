services:
  postgres:
    image: postgres:15-alpine
    container_name: ez-commerce-postgres
    environment:
      POSTGRES_DB: medusa-backend
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ez-commerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  minio:
    image: minio/minio
    container_name: ez-commerce-minio
    ports:
      - "9001:9001"
      - "9010:9000"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    restart: always

volumes:
  pgdata:
  redisdata:
  miniodata:
